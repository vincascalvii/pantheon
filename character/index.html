			</div>

		<section class="main container">
            <div class="main-art">
				<img 
                    src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" 
					id="pop-art-character" 
                    class="main-art-img"
					alt="Character"
					onerror="this.style.display='none'"
                />
			</div>
            <div class="main-info">
				<div class="main-header">
					<img 
                        src="../img/bastions/all.png"
                        id="pop-art-bastion"
                        class="main-bastion" 
                        alt="Bastion Logo"
						onerror="this.style.display='none'"
                    />
                    <div>
                        <h1 class="main-name" id="pop-name">N/A</h1>
					    <div class="main-title" id="pop-title">N/A</div>
                    </div>
				</div>
				<div class="main-tab active" data-tab="lore">
					<div class="main-tab-con">
						<h2 class="main-heading">Lore</h2>
						<div class="main-lore" id="pop-lore"></div>
					</div>
				</div>
				<div class="main-tab" data-tab="abilities">
					<div class="main-tab-con">
						<h2 class="main-heading">Abilities</h2>
						<div class="ability-nav">
							<div class="ability-nav-item active" data-ability="Passive"></div>
							<div class="ability-nav-item" data-ability="First Ability"></div>
							<div class="ability-nav-item" data-ability="Second Ability"></div>
							<div class="ability-nav-item" data-ability="Third Ability"></div>
							<div class="ability-nav-item" data-ability="Ultimate"></div>
						</div>
						<div class="ability-list" id="pop-abilities"></div>
					</div>
				</div>
				<div class="main-tab" data-tab="backstory">
					<div class="main-tab-con">
						Coming Soon.
					</div>
				</div>
				<div class="main-tab" data-tab="quotes">
					<div class="main-tab-con">
						Coming Soon.
					</div>
				</div>
			</div>
